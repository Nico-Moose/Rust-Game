<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game — Moose Rust: Wasteland</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page game-page">
      <header class="topbar card">
        <div>
          <p class="eyebrow">Survival PvP mini app</p>
          <h1>Moose Rust: Wasteland</h1>
        </div>
        <div class="topbar-actions">
          <button class="btn ghost" id="refresh-btn">Обновить</button>
          <button class="btn danger" id="logout-btn">Выйти</button>
        </div>
      </header>

      <section class="grid-layout">
        <section class="card profile-card">
          <h2>Игрок</h2>
          <div id="player-profile">Загрузка...</div>
        </section>

        <section class="card map-card">
          <div class="section-head">
            <h2>Карта</h2>
            <button class="btn primary" id="gather-btn">Добыть</button>
          </div>
          <div class="controls">
            <button class="btn" data-move="up">↑</button>
            <div class="control-row">
              <button class="btn" data-move="left">←</button>
              <button class="btn" data-move="down">↓</button>
              <button class="btn" data-move="right">→</button>
            </div>
          </div>
          <div id="map-grid" class="map-grid"></div>
          <div id="game-message" class="game-message"></div>
        </section>

        <section class="card inventory-card">
          <h2>Инвентарь</h2>
          <div id="inventory-list">Загрузка...</div>
        </section>

        <section class="card logs-card">
          <h2>Логи</h2>
          <div id="logs-list">Загрузка...</div>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
